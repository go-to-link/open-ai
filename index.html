<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Estafet - Premium</title>
    <!-- Tailwind CSS dengan Konfigurasi Dark Mode Manual -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        darkBg: '#0f172a',    // Slate 900
                        darkCard: '#1e293b',  // Slate 800
                        darkBorder: '#334155' // Slate 700
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        
        /* Transisi warna global agar perpindahan Dark/Light mulus */
        * { transition-property: background-color, border-color, color, fill, stroke; transition-duration: 300ms; }
        
        /* Scrollbar Halus & Tipis yang menyesuaikan tema */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        
        /* Efek Titik Mengetik */
        .typing-dot { animation: typing 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-darkBg text-slate-700 dark:text-slate-300 h-screen overflow-hidden selection:bg-indigo-500/30">

    <div class="flex h-screen w-full max-w-[1600px] mx-auto md:p-4 gap-4 transition-colors duration-300">

        <!-- Sidebar Kiri -->
        <div id="sidebar" class="w-72 bg-white/80 dark:bg-darkCard/80 backdrop-blur-xl border border-slate-200/60 dark:border-darkBorder md:rounded-3xl flex flex-col transition-transform duration-300 transform -translate-x-full md:translate-x-0 absolute md:relative z-40 h-full shadow-xl shadow-slate-200/20 dark:shadow-black/40">
            
            <div class="p-6 border-b border-slate-100 dark:border-darkBorder flex items-center justify-between">
                <div>
                    <h1 class="text-xl font-bold tracking-tight text-slate-800 dark:text-white flex items-center gap-2">
                        AI <span class="text-indigo-600 dark:text-indigo-400">Estafet</span>
                    </h1>
                    <span id="headerModelName" class="text-[9px] font-bold text-indigo-600 dark:text-indigo-300 bg-indigo-50 dark:bg-indigo-500/10 px-2.5 py-1 rounded-full uppercase tracking-wider mt-1.5 inline-block border border-indigo-100 dark:border-indigo-500/20">
                        ✨ MEMUAT...
                    </span>
                </div>
                
                <div class="flex items-center gap-1">
                    <!-- Tombol Toggle Tema -->
                    <button onclick="toggleTheme()" class="text-slate-400 hover:text-amber-500 dark:hover:text-amber-300 p-2 bg-slate-50 dark:bg-slate-800 rounded-full transition-colors">
                        <!-- Icon Sun/Moon dinamis via JS -->
                        <span id="themeIcon" class="block w-5 h-5 flex items-center justify-center text-lg">🌙</span>
                    </button>
                    <!-- Tutup Sidebar (Mobile) -->
                    <button onclick="toggleSidebar()" class="md:hidden text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 p-2 bg-slate-50 dark:bg-slate-800 rounded-full">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
            </div>
            
            <div class="p-4">
                <button onclick="startNewChat()" class="w-full bg-slate-900 dark:bg-indigo-600 hover:bg-black dark:hover:bg-indigo-500 text-white font-medium py-3 px-4 rounded-2xl shadow-lg transition-all flex items-center justify-center gap-2 active:scale-95 text-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    Percakapan Baru
                </button>
            </div>

            <!-- List Riwayat -->
            <div class="flex-1 overflow-y-auto px-3 space-y-1" id="historyList">
                <!-- Riwayat dimuat di sini -->
            </div>

            <!-- Tombol Pengaturan -->
            <div class="p-4 border-t border-slate-100 dark:border-darkBorder bg-white/50 dark:bg-darkCard/50 backdrop-blur-md md:rounded-b-3xl">
                <button onclick="openSettings()" class="w-full flex items-center justify-center gap-2 text-slate-500 dark:text-slate-400 hover:text-indigo-600 dark:hover:text-indigo-400 font-medium transition-colors p-3 rounded-2xl hover:bg-slate-50 dark:hover:bg-slate-800 text-sm">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    Konfigurasi Sistem
                </button>
            </div>
        </div>

        <div class="flex-1 flex flex-col h-full bg-white dark:bg-darkCard md:rounded-3xl shadow-xl shadow-slate-200/20 dark:shadow-black/40 border border-slate-200/60 dark:border-darkBorder relative overflow-hidden w-full transition-colors duration-300">
            
            <!-- Mobile Header -->
            <div class="md:hidden flex items-center justify-between p-4 border-b border-slate-100 dark:border-darkBorder bg-white/80 dark:bg-darkCard/80 backdrop-blur-md sticky top-0 z-30 pt-4">
                <div class="flex items-center">
                    <button onclick="toggleSidebar()" class="text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-white mr-3 p-2 bg-slate-50 dark:bg-slate-800 rounded-full">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    </button>
                    <h1 class="text-lg font-bold text-slate-800 dark:text-white flex items-center tracking-tight">AI <span class="text-indigo-600 dark:text-indigo-400 ml-1">Estafet</span></h1>
                </div>
                <button onclick="toggleTheme()" class="text-slate-400 hover:text-amber-500 dark:hover:text-amber-300 p-2 bg-slate-50 dark:bg-slate-800 rounded-full">
                    <span id="themeIconMobile" class="block w-5 h-5 flex items-center justify-center text-lg">🌙</span>
                </button>
            </div>

            <!-- Tampilan Chat -->
            <div id="chatArea" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-8 scroll-smooth w-full pb-48">
                
                <!-- Welcome State (Dibuat Lebih Bersih & Minimalis) -->
                <div id="welcomeState" class="h-full flex flex-col items-center justify-center text-center max-w-2xl mx-auto px-4 mt-[-5vh]">
                    <div class="w-20 h-20 bg-gradient-to-tr from-indigo-50 to-white dark:from-indigo-900/40 dark:to-slate-800 rounded-[2rem] flex items-center justify-center mb-6 shadow-sm border border-slate-100 dark:border-slate-700">
                        <span class="text-4xl">✨</span>
                    </div>
                    <h2 class="text-3xl md:text-4xl font-bold text-slate-800 dark:text-white mb-4 tracking-tight">Halo, Arsitek!</h2>
                    <p class="text-slate-500 dark:text-slate-400 text-lg mb-10 font-light">Pabrik software dalam kondisi optimal. Ide brilian apa yang ingin kita wujudkan hari ini?</p>
                </div>
            </div>

            <!-- Input Area Terpasang di Bawah -->
            <div class="absolute bottom-0 left-0 w-full p-4 md:p-6 bg-gradient-to-t from-white via-white/95 to-transparent dark:from-darkCard dark:via-darkCard/95 pt-16">
                <div class="max-w-4xl mx-auto relative">
                    
                    <!-- Quick Actions Row (Deretan Tombol Kilat) -->
                    <div class="flex gap-2 mb-3 overflow-x-auto pb-2 scrollbar-hide px-1 absolute -top-12 left-0 w-full">
                        <button type="button" onclick="insertMantraDewa()" class="whitespace-nowrap px-4 py-2 bg-gradient-to-r from-indigo-500 to-violet-600 hover:from-indigo-600 hover:to-violet-700 text-white text-xs font-semibold rounded-full shadow-lg shadow-indigo-500/20 transition-all flex items-center gap-1.5 transform hover:-translate-y-0.5 border border-indigo-400/30">
                            <span class="text-sm">👑</span> Mantra Dewa (Web)
                        </button>
                        <button type="button" onclick="appendPrompt('Tolong perbaiki kode ini karena muncul error putih polos. Berikut kodenya:\n\n')" class="whitespace-nowrap px-4 py-2 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300 text-xs font-medium rounded-full border border-slate-200 dark:border-slate-700 shadow-sm transition-all">
                            🛠️ Fix Error
                        </button>
                        <button type="button" onclick="useQuickPrompt('Buatkan game Snake sederhana menggunakan HTML, CSS dan JS lengkap dalam 1 file. Tambahkan warna hijau terang dan skor.')" class="whitespace-nowrap px-4 py-2 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300 text-xs font-medium rounded-full border border-slate-200 dark:border-slate-700 shadow-sm transition-all">
                            🐍 Game Snake
                        </button>
                        <button type="button" onclick="useQuickPrompt('Buatkan aplikasi Todo List estetik menggunakan Tailwind CSS dan Javascript murni. Simpan data ke localStorage.')" class="whitespace-nowrap px-4 py-2 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300 text-xs font-medium rounded-full border border-slate-200 dark:border-slate-700 shadow-sm transition-all">
                            📝 To-Do List
                        </button>
                    </div>

                    <!-- Input Box -->
                    <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-[2rem] shadow-xl shadow-slate-200/50 dark:shadow-black/50 focus-within:border-indigo-400 dark:focus-within:border-indigo-500 focus-within:ring-4 focus-within:ring-indigo-50 dark:focus-within:ring-indigo-500/10 transition-all flex items-end p-2 relative z-10">
                        <form id="chatForm" onsubmit="handleSend(event)" class="flex items-end gap-2 w-full pl-4">
                            <textarea 
                                id="messageInput" 
                                class="flex-1 max-h-48 min-h-[52px] bg-transparent text-slate-700 dark:text-slate-100 py-3.5 outline-none resize-none placeholder-slate-400 dark:placeholder-slate-500 text-base" 
                                placeholder="Ketik ide aplikasi atau instruksi Anda di sini..."
                                onkeydown="checkSubmit(event)"
                            ></textarea>
                            <button type="submit" id="sendBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white w-12 h-12 rounded-full transition-all shadow-md active:scale-95 mb-1 mr-1 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center flex-shrink-0">
                                <svg class="w-5 h-5 ml-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div id="settingsModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4 transition-opacity">
            <div class="bg-white dark:bg-darkCard rounded-[2rem] w-full max-w-md shadow-2xl overflow-hidden transform scale-95 transition-all border border-slate-100 dark:border-darkBorder">
                <div class="p-6 border-b border-slate-100 dark:border-darkBorder flex justify-between items-center bg-slate-50/50 dark:bg-slate-800/50">
                    <h3 class="text-lg font-bold text-slate-800 dark:text-white flex items-center gap-2">
                        <span class="p-2 bg-indigo-50 dark:bg-indigo-500/10 text-indigo-600 dark:text-indigo-400 rounded-xl">⚙️</span>
                        Konfigurasi Sistem
                    </h3>
                    <button onclick="closeSettings()" class="text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 p-2 bg-white dark:bg-slate-800 rounded-full shadow-sm border border-slate-100 dark:border-slate-700"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                </div>
                
                <div class="p-6 space-y-5 bg-white dark:bg-darkCard">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">Provider AI</label>
                        <select id="apiProvider" onchange="toggleCustomUrl()" class="w-full p-3.5 rounded-2xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 text-sm focus:border-indigo-400 dark:focus:border-indigo-500 outline-none transition-all text-slate-700 dark:text-slate-200 font-medium cursor-pointer">
                            <option value="gemini">Google Gemini (Presisi Tinggi)</option>
                            <option value="groq">Groq (Mandor Kilat)</option>
                            <option value="openrouter">OpenRouter (Jalur Gratis)</option>
                            <option value="openai">OpenAI (ChatGPT)</option>
                            <option value="custom">Custom Server</option>
                        </select>
                    </div>

                    <div id="customUrlContainer" class="hidden">
                        <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">Custom Base URL</label>
                        <input type="text" id="apiBaseUrl" placeholder="https://api.openai.com/v1" class="w-full p-3.5 rounded-2xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 text-sm focus:border-indigo-400 outline-none transition-all text-slate-700 dark:text-slate-200">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2 flex items-center justify-between">
                            <span>API Key (Mode Estafet)</span>
                            <span class="text-[10px] text-indigo-500 dark:text-indigo-400 font-normal bg-indigo-50 dark:bg-indigo-500/10 px-2 py-0.5 rounded-md">Bisa > 1 Key</span>
                        </label>
                        <textarea id="apiKeys" rows="3" placeholder="Masukkan API Key 1...&#10;Paste API Key 2 di baris baru...&#10;Sistem ganti key otomatis jika limit!" class="w-full p-3.5 rounded-2xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 text-sm focus:border-indigo-400 outline-none transition-all text-slate-700 dark:text-slate-300 font-mono resize-none"></textarea>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">Pilih Model Utama</label>
                        <select id="apiModel" class="w-full p-3.5 rounded-2xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 text-sm focus:border-indigo-400 outline-none transition-all text-slate-700 dark:text-slate-200 font-medium cursor-pointer">
                            <optgroup label="Google Gemini">
                                <option value="gemini-2.5-flash">Gemini 2.5 Flash (Arsitek Utama)</option>
                                <option value="gemini-2.0-pro-exp-02-05">Gemini 2.0 Pro Experimental</option>
                            </optgroup>
                            <optgroup label="Groq Models">
                                <option value="llama-3.3-70b-versatile">Llama 3.3 70B (Mandor Cepat)</option>
                                <option value="deepseek-r1-distill-llama-70b">DeepSeek R1 Distill</option>
                            </optgroup>
                            <optgroup label="OpenRouter">
                                <option value="google/gemini-2.5-flash:free">Gemini 2.5 Flash (Gratis OpenRouter)</option>
                                <option value="deepseek/deepseek-chat">DeepSeek Chat</option>
                            </optgroup>
                        </select>
                    </div>
                </div>

                <div class="p-6 border-t border-slate-100 dark:border-darkBorder bg-slate-50/50 dark:bg-slate-800/50 flex gap-3">
                    <button onclick="closeSettings()" class="flex-1 py-3.5 px-4 rounded-2xl font-semibold text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 transition-all text-sm border border-transparent">Batal</button>
                    <button onclick="saveSettings()" class="flex-1 py-3.5 px-4 bg-slate-900 dark:bg-indigo-600 hover:bg-black dark:hover:bg-indigo-500 text-white rounded-2xl font-bold shadow-lg transition-all text-sm">Simpan Formasi</button>
                </div>
            </div>
        </div>

        <!-- Toast Notifikasi Estetik -->
        <div id="toast" class="fixed top-8 left-1/2 transform -translate-x-1/2 -translate-y-24 bg-slate-900/95 dark:bg-white/95 backdrop-blur-md text-white dark:text-slate-900 px-6 py-3.5 rounded-full shadow-2xl transition-all duration-300 z-50 flex items-center gap-3 font-semibold text-sm border border-slate-700 dark:border-slate-200 opacity-0 pointer-events-none">
            <span class="text-lg">✅</span>
            <span id="toastMsg">Pengaturan Tersimpan</span>
        </div>
    </div>

    <script>
        // --- MANAJEMEN TEMA (DARK/LIGHT MODE) ---
        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'dark'; // Defaultnya kita buat Dark agar cantik
            if (savedTheme === 'dark') {
                document.documentElement.classList.add('dark');
                updateThemeIcons(true);
            } else {
                document.documentElement.classList.remove('dark');
                updateThemeIcons(false);
            }
        }

        function toggleTheme() {
            const html = document.documentElement;
            html.classList.toggle('dark');
            const isDark = html.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcons(isDark);
        }

        function updateThemeIcons(isDark) {
            const iconStr = isDark ? '☀️' : '🌙';
            document.getElementById('themeIcon').innerText = iconStr;
            document.getElementById('themeIconMobile').innerText = iconStr;
        }

        // Jalankan inisialisasi tema saat pertama diload
        initTheme();

        // --- STATE GLOBAL & API ---
        let chatSessions = JSON.parse(localStorage.getItem('sessions')) || [];
        let currentSessionId = localStorage.getItem('currentSessionId') || null;

        let settings = JSON.parse(localStorage.getItem('apiSettings')) || {
            provider: 'gemini',
            baseUrl: 'https://generativelanguage.googleapis.com/v1beta/openai',
            apiKeys: [], 
            model: 'gemini-2.5-flash'
        };

        if (settings.apiKey && (!settings.apiKeys || settings.apiKeys.length === 0)) {
            settings.apiKeys = [settings.apiKey];
            delete settings.apiKey;
        }

        // Fungsi mengubah julukan dinamis Header
        function updateHeaderName() {
            let displayName = settings.model.split('/').pop().toUpperCase();
            const headerEl = document.getElementById('headerModelName');
            
            if (!headerEl) return;

            if (settings.provider === 'gemini' || displayName.includes('GEMINI')) {
                headerEl.innerText = '✨ GEMINI (MODE DEWA)';
                headerEl.className = 'text-[9px] font-bold text-indigo-600 dark:text-indigo-300 bg-indigo-50 dark:bg-indigo-500/20 px-2.5 py-1 rounded-full uppercase tracking-wider mt-1.5 inline-block border border-indigo-100 dark:border-indigo-500/30';
            }
            else if (settings.provider === 'groq' || displayName.includes('LLAMA')) {
                headerEl.innerText = '🏎️ GROQ (MODE KILAT)';
                headerEl.className = 'text-[9px] font-bold text-emerald-600 dark:text-emerald-300 bg-emerald-50 dark:bg-emerald-500/20 px-2.5 py-1 rounded-full uppercase tracking-wider mt-1.5 inline-block border border-emerald-100 dark:border-emerald-500/30';
            }
            else {
                headerEl.innerText = '👑 ' + displayName;
                headerEl.className = 'text-[9px] font-bold text-slate-600 dark:text-slate-300 bg-slate-100 dark:bg-slate-700 px-2.5 py-1 rounded-full uppercase tracking-wider mt-1.5 inline-block border border-slate-200 dark:border-slate-600';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateHeaderName();
            if (chatSessions.length === 0) {
                startNewChat();
            } else {
                if (!currentSessionId || !chatSessions.find(s => s.id === currentSessionId)) {
                    currentSessionId = chatSessions[0].id;
                }
                renderHistoryList();
                loadChat(currentSessionId);
            }
            
            const tx = document.getElementById('messageInput');
            tx.addEventListener("input", function() {
                this.style.height = "52px";
                this.style.height = (this.scrollHeight) + "px";
            });
        });

        // --- MANTRA DEWA ANTI-ERROR (Penyambungan String Aman) ---
        function insertMantraDewa() {
            // Trik memecah script agar browser tidak memotongnya!
            const scriptTagStart = "<" + "script src=\"https://cdn.tailwindcss.com\">";
            const scriptTagEnd = "<" + "/script>";

            const mantra = "Bertindaklah sebagai Senior Full-Stack Web Architect dengan spesialisasi Single-File Web Apps. Saya ingin Anda membuatkan aplikasi web dengan desain UI super mewah, elegan, minimalis (Apple/Vercel style), mematuhi 100% instruksi teknis di bawah ini:\n\n" +
            "1. KEWAJIBAN SINGLE-FILE:\n" +
            "   - Gabungkan seluruh HTML, CSS, JavaScript, dan data dummy ke dalam SATU file index.html saja.\n" +
            "   - Simpan data JSON sebagai variabel konstan di dalam script.\n\n" +
            "2. SINTAKSIS JAVASCRIPT KETAT:\n" +
            "   - Jika membuat template HTML dinamis di dalam JavaScript, WAJIB bungkus dengan tanda backtick secara utuh.\n" +
            "   - Tulis semua fungsi JavaScript secara UTUH tanpa placeholder.\n\n" +
            "3. STYLING MINIMALIS PREMIUM:\n" +
            "   - WAJIB panggil Tailwind CSS via CDN: " + scriptTagStart + scriptTagEnd + "\n" +
            "   - Gunakan warna background terang/soft, sudut membulat, bayangan lembut, dan beri ruang padding yang lega.\n\n" +
            "Buatkan kode utuh dari DOCTYPE html sampai </html> untuk aplikasi berikut:\n\n" +
            "[TULIS PERMINTAAN APLIKASI KAKAK DI SINI]";
            
            const input = document.getElementById('messageInput');
            input.value = mantra;
            input.style.height = "52px";
            input.style.height = (input.scrollHeight) + "px";
            input.focus();
        }

        // --- UI CONTROLS ---
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('-translate-x-full');
        }

        function useQuickPrompt(text) {
            document.getElementById('messageInput').value = text;
            document.getElementById('chatForm').dispatchEvent(new Event('submit'));
        }
        
        function appendPrompt(text) {
            const input = document.getElementById('messageInput');
            input.value = text + input.value;
            input.focus();
        }

        function checkSubmit(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                document.getElementById('chatForm').requestSubmit();
            }
        }

        // --- PENGATURAN API ---
        function openSettings() {
            document.getElementById('settingsModal').classList.remove('hidden');
            loadSettingsToInputs();
            if(window.innerWidth < 768) toggleSidebar();
        }

        function closeSettings() {
            document.getElementById('settingsModal').classList.add('hidden');
        }

        function loadSettingsToInputs() {
            document.getElementById('apiProvider').value = settings.provider;
            document.getElementById('apiBaseUrl').value = settings.baseUrl || '';
            document.getElementById('apiKeys').value = (settings.apiKeys || []).join('\n');
            document.getElementById('apiModel').value = settings.model;
            toggleCustomUrl();
        }

        function toggleCustomUrl() {
            const provider = document.getElementById('apiProvider').value;
            const customUrlContainer = document.getElementById('customUrlContainer');
            
            if (provider === 'custom') customUrlContainer.classList.remove('hidden');
            else customUrlContainer.classList.add('hidden');
            
            const modelSelect = document.getElementById('apiModel');
            if(provider === 'groq') modelSelect.value = 'llama-3.3-70b-versatile';
            else if (provider === 'gemini') modelSelect.value = 'gemini-2.5-flash';
        }

        function saveSettings() {
            const provider = document.getElementById('apiProvider').value;
            let baseUrl = 'https://openrouter.ai/api/v1';
            
            if (provider === 'openai') baseUrl = 'https://api.openai.com/v1';
            else if (provider === 'groq') baseUrl = 'https://api.groq.com/openai/v1';
            else if (provider === 'gemini') baseUrl = 'https://generativelanguage.googleapis.com/v1beta/openai';
            else if (provider === 'custom') baseUrl = document.getElementById('apiBaseUrl').value;

            const keysInput = document.getElementById('apiKeys').value;
            const keysArray = keysInput.split('\n').map(k => k.trim()).filter(k => k.length > 0);

            settings = {
                provider: provider,
                baseUrl: baseUrl,
                apiKeys: keysArray,
                model: document.getElementById('apiModel').value
            };

            localStorage.setItem('apiSettings', JSON.stringify(settings));
            updateHeaderName();
            
            closeSettings();
            showToast("Formasi Estafet Disimpan!");
        }

        function showToast(message) {
            document.getElementById('toastMsg').innerText = message;
            const toast = document.getElementById('toast');
            toast.classList.remove('opacity-0', '-translate-y-24');
            toast.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                toast.classList.add('opacity-0', '-translate-y-24');
                toast.classList.remove('opacity-100', 'translate-y-0');
            }, 3000);
        }

        // --- MANAJEMEN CHAT ---
        function startNewChat() {
            const newId = 'session_' + Date.now();
            const newSession = { id: newId, title: 'Percakapan Baru', messages: [] };
            chatSessions.unshift(newSession);
            currentSessionId = newId;
            saveSessions();
            renderHistoryList();
            loadChat(newId);
            if(window.innerWidth < 768) toggleSidebar();
        }

        function loadChat(sessionId) {
            currentSessionId = sessionId;
            localStorage.setItem('currentSessionId', sessionId);
            renderHistoryList();
            
            const session = chatSessions.find(s => s.id === sessionId);
            const chatArea = document.getElementById('chatArea');
            const welcomeState = document.getElementById('welcomeState');
            
            const bubbles = chatArea.querySelectorAll('.message-bubble');
            bubbles.forEach(b => b.remove());

            if (session.messages.length === 0) {
                welcomeState.style.display = 'flex';
            } else {
                welcomeState.style.display = 'none';
                session.messages.forEach(msg => {
                    if(msg.role !== 'system') appendMessageBubble(msg.role, msg.content);
                });
            }
            chatArea.scrollTop = chatArea.scrollHeight;
            if(window.innerWidth < 768 && !document.getElementById('sidebar').classList.contains('-translate-x-full')) toggleSidebar();
        }

        function saveSessions() {
            localStorage.setItem('sessions', JSON.stringify(chatSessions));
        }

        function renderHistoryList() {
            const list = document.getElementById('historyList');
            list.innerHTML = '';
            
            chatSessions.forEach(session => {
                const isActive = session.id === currentSessionId;
                const btn = document.createElement('button');
                
                // Menyesuaikan warna history list agar elegan di Dark/Light mode
                const baseClass = "w-full text-left px-4 py-3 rounded-2xl truncate text-sm transition-all flex items-center justify-between group mb-1 font-medium ";
                const activeClass = isActive 
                    ? "bg-indigo-50 dark:bg-indigo-500/20 text-indigo-700 dark:text-indigo-300 shadow-sm border border-indigo-100 dark:border-indigo-500/30" 
                    : "text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800/50 hover:text-slate-800 dark:hover:text-slate-200 border border-transparent";
                
                btn.className = baseClass + activeClass;
                
                const titleSpan = document.createElement('span');
                titleSpan.className = 'truncate flex-1';
                titleSpan.innerText = session.title || 'Percakapan Baru';
                
                const delBtn = document.createElement('span');
                delBtn.className = 'opacity-0 group-hover:opacity-100 p-1.5 hover:bg-red-100 hover:text-red-600 dark:hover:bg-red-500/20 dark:hover:text-red-400 text-slate-400 transition-all ml-2 rounded-lg';
                delBtn.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>';
                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    deleteChat(session.id);
                };

                btn.onclick = () => loadChat(session.id);
                btn.appendChild(titleSpan);
                btn.appendChild(delBtn);
                list.appendChild(btn);
            });
        }

        function deleteChat(id) {
            chatSessions = chatSessions.filter(s => s.id !== id);
            if (chatSessions.length === 0) startNewChat();
            else {
                if (currentSessionId === id) loadChat(chatSessions[0].id);
                else { saveSessions(); renderHistoryList(); }
            }
        }

        // --- RENDERING PESAN (Cantik ala Luna Maya) ---
        function formatText(text) {
            let formatted = text.replace(/\*\*(.*?)\*\*/g, '<strong class="font-bold text-slate-900 dark:text-white">$1</strong>');
            
            // Format Code Blocks dgn gaya Mac
            formatted = formatted.replace(/```([\s\S]*?)```/g, function(match, code) {
                const lines = code.trim().split('\n');
                let lang = '';
                if(lines.length > 0 && lines[0].trim().match(/^[a-z]+$/i)) {
                    lang = lines.shift().trim();
                }
                const cleanCode = lines.join('\n');
                const safeCode = cleanCode.replace(/</g, '&lt;').replace(/>/g, '&gt;');
                
                return `
                    <div class="my-5 rounded-2xl overflow-hidden border border-slate-200 dark:border-slate-700 bg-[#f8fafc] dark:bg-slate-900 shadow-sm">
                        <div class="flex justify-between items-center px-5 py-3 bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700">
                            <span class="text-xs text-slate-500 dark:text-slate-400 font-mono font-semibold uppercase tracking-wider">${lang || 'code'}</span>
                            <button onclick="navigator.clipboard.writeText(this.nextElementSibling.innerText); showToast('Kode disalin!')" class="text-xs text-slate-500 dark:text-slate-400 hover:text-indigo-600 dark:hover:text-indigo-400 font-medium flex items-center gap-1.5 transition-colors bg-slate-50 dark:bg-slate-700 px-3 py-1.5 rounded-lg border border-slate-100 dark:border-slate-600">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                                Copy Code
                            </button>
                            <span class="hidden">${safeCode}</span>
                        </div>
                        <div class="p-5 overflow-x-auto text-[13px] md:text-sm">
                            <pre class="font-mono text-slate-700 dark:text-slate-300 leading-relaxed"><code>${safeCode}</code></pre>
                        </div>
                    </div>
                `;
            });
            
            const parts = formatted.split('<div class="my-5');
            let finalHtml = parts[0].replace(/\n/g, '<br>');
            for(let i=1; i<parts.length; i++) {
                const endCodeIndex = parts[i].indexOf('</div></div>') + 12;
                const codePart = '<div class="my-5' + parts[i].substring(0, endCodeIndex);
                const textPart = parts[i].substring(endCodeIndex).replace(/\n/g, '<br>');
                finalHtml += codePart + textPart;
            }

            return finalHtml;
        }

        function appendMessageBubble(role, content) {
            const chatArea = document.getElementById('chatArea');
            const div = document.createElement('div');
            div.className = `message-bubble flex gap-4 w-full ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            
            // Penyesuaian warna Bubble yang sangat estetik
            let bubbleStyle = role === 'user' 
                ? 'bg-indigo-600 text-white rounded-[2rem] rounded-br-sm shadow-md shadow-indigo-500/20' 
                : 'bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700/50 text-slate-700 dark:text-slate-200 rounded-[2rem] rounded-bl-sm shadow-sm';
                
            let avatar = role === 'user' 
                ? '' 
                : '<div class="w-10 h-10 rounded-2xl bg-gradient-to-tr from-indigo-50 to-white dark:from-indigo-900/40 dark:to-slate-800 border border-slate-100 dark:border-slate-700 flex-shrink-0 flex items-center justify-center text-lg shadow-sm mt-1">✨</div>';

            div.innerHTML = `
                ${role !== 'user' ? avatar : ''}
                <div class="${bubbleStyle} px-6 py-4 max-w-[90%] md:max-w-[80%] leading-relaxed text-[15px]">
                    ${formatText(content)}
                </div>
            `;
            chatArea.appendChild(div);
        }

        // --- MESIN PENGIRIMAN & ESTAFET ---
        async function handleSend(e) {
            e.preventDefault();
            const inputEl = document.getElementById('messageInput');
            const message = inputEl.value.trim();
            if (!message) return;

            const sendBtn = document.getElementById('sendBtn');
            inputEl.value = '';
            inputEl.style.height = '52px';
            sendBtn.disabled = true;

            const welcomeState = document.getElementById('welcomeState');
            if (welcomeState) welcomeState.style.display = 'none';

            appendMessageBubble('user', message);

            const sessionIndex = chatSessions.findIndex(s => s.id === currentSessionId);
            if (sessionIndex !== -1) {
                chatSessions[sessionIndex].messages.push({ role: 'user', content: message });
                if (chatSessions[sessionIndex].messages.length === 1) {
                    let title = message.substring(0, 30);
                    if(message.length > 30) title += '...';
                    chatSessions[sessionIndex].title = title;
                    renderHistoryList();
                }
                saveSessions();
            }

            const chatArea = document.getElementById('chatArea');
            chatArea.scrollTop = chatArea.scrollHeight;

            if (!settings.apiKeys || settings.apiKeys.length === 0) {
                showTypingIndicator(true);
                setTimeout(() => {
                    showTypingIndicator(false);
                    const mockReply = "Halo, Kak! Saya siap membantu Kakak membuat program kelas dunia. 😎\n\n**Namun, saya mendeteksi API Key di menu Settings masih kosong!**\nSilakan klik menu Konfigurasi untuk memasukkan kunci.";
                    appendMessageBubble('assistant', mockReply);
                    
                    if (sessionIndex !== -1) {
                        chatSessions[sessionIndex].messages.push({ role: 'assistant', content: mockReply });
                        saveSessions();
                    }
                    sendBtn.disabled = false;
                    chatArea.scrollTop = chatArea.scrollHeight;
                }, 1000);
                return;
            }

            showTypingIndicator(true);

            try {
                const requestMessages = chatSessions[sessionIndex].messages.map(m => ({ role: m.role, content: m.content }));
                let apiResponse = null;
                let lastErrorMsg = "";
                let successfulKeyIndex = -1;

                // Logika Estafet Kunci
                for (let i = 0; i < settings.apiKeys.length; i++) {
                    const currentKey = settings.apiKeys[i];
                    try {
                        const response = await fetch(`${settings.baseUrl}/chat/completions`, {
                            method: 'POST',
                            headers: { 'Authorization': `Bearer ${currentKey}`, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ model: settings.model, messages: requestMessages, stream: false })
                        });

                        if (response.ok) {
                            apiResponse = await response.json();
                            successfulKeyIndex = i;
                            break; 
                        } else {
                            const errData = await response.json().catch(()=>({}));
                            lastErrorMsg = errData?.error?.message || `HTTP Error ${response.status}`;
                            continue; 
                        }
                    } catch (fetchError) {
                        lastErrorMsg = fetchError.message;
                        continue;
                    }
                }

                showTypingIndicator(false);

                if (!apiResponse) throw new Error(`Semua sistem kunci API sibuk/habis kuota.\n\n*Log Error:*\n\`${lastErrorMsg}\``);

                const aiReplyText = apiResponse.choices[0].message.content;
                let prefixInfo = "";
                if (successfulKeyIndex > 0) prefixInfo = `> 🔄 *Sistem Estafet: Beralih ke Kunci API ke-${successfulKeyIndex + 1} (Limit terdeteksi)*\n\n`;

                appendMessageBubble('assistant', prefixInfo + aiReplyText);

                if (sessionIndex !== -1) {
                    chatSessions[sessionIndex].messages.push({ role: 'assistant', content: prefixInfo + aiReplyText });
                    saveSessions();
                }

            } catch (error) {
                showTypingIndicator(false);
                appendMessageBubble('assistant', `❌ **Gangguan Sistem:**\n\n${error.message}`);
            } finally {
                sendBtn.disabled = false;
                chatArea.scrollTop = chatArea.scrollHeight;
                inputEl.focus();
            }
        }

        function showTypingIndicator(show) {
            const chatArea = document.getElementById('chatArea');
            let indicator = document.getElementById('typingIndicator');
            
            if (show) {
                if (!indicator) {
                    const div = document.createElement('div');
                    div.id = 'typingIndicator';
                    div.className = 'message-bubble flex gap-4 w-full justify-start mt-4';
                    div.innerHTML = `
                        <div class="w-10 h-10 rounded-2xl bg-gradient-to-tr from-indigo-50 to-white dark:from-indigo-900/40 dark:to-slate-800 border border-slate-100 dark:border-slate-700 flex-shrink-0 flex items-center justify-center text-lg shadow-sm">✨</div>
                        <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700/50 p-5 rounded-3xl rounded-bl-sm flex gap-2 items-center shadow-sm">
                            <div class="w-2 h-2 bg-indigo-300 dark:bg-indigo-500 rounded-full typing-dot"></div>
                            <div class="w-2 h-2 bg-indigo-300 dark:bg-indigo-500 rounded-full typing-dot"></div>
                            <div class="w-2 h-2 bg-indigo-300 dark:bg-indigo-500 rounded-full typing-dot"></div>
                        </div>
                    `;
                    chatArea.appendChild(div);
                }
            } else {
                if (indicator) indicator.remove();
            }
            chatArea.scrollTop = chatArea.scrollHeight;
        }
    </script>
</body>
