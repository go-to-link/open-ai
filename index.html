<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Neon Snake</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Variabel CSS untuk kemudahan pengaturan */
        :root {
            --grid-size: 20; /* Jumlah kotak per sisi grid */
            --cell-size: 20px; /* Ukuran setiap kotak */
            --neon-green: #34D399; /* Tailwind emerald-400 */
            --dark-bg: #111827; /* Tailwind gray-900 */
        }

        body {
            font-family: 'Press Start 2P', cursive; /* Font retro pixelated */
            background-color: var(--dark-bg);
            color: var(--neon-green);
        }

        /* Mengimpor font Google Fonts untuk gaya retro */
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        /* Gaya untuk container game */
        #game-container {
            border-color: var(--neon-green);
            box-shadow: 0 0 15px var(--neon-green), 0 0 25px var(--neon-green), 0 0 40px var(--neon-green);
        }

        /* Gaya untuk papan game */
        #game-board {
            display: grid;
            grid-template-columns: repeat(var(--grid-size), 1fr);
            width: calc(var(--grid-size) * var(--cell-size));
            height: calc(var(--grid-size) * var(--cell-size));
            background-color: var(--dark-bg);
        }

        /* Gaya untuk setiap sel (kotak) pada papan */
        .game-cell {
            width: var(--cell-size);
            height: var(--cell-size);
            box-sizing: border-box; /* Pastikan border tidak menambah ukuran total */
            transition: background-color 0.05s ease-in-out; /* Transisi warna yang halus */
        }

        /* Gaya untuk bagian tubuh ular */
        .snake-cell {
            background-color: var(--neon-green);
            border: 1px solid var(--neon-green); /* Sedikit border untuk definisi */
            box-shadow: 0 0 5px var(--neon-green);
        }

        /* Gaya untuk makanan */
        .food-cell {
            background-color: #EF4444; /* Merah untuk kontras */
            border-radius: 50%; /* Membuat makanan bulat */
            box-shadow: 0 0 8px #EF4444;
            animation: pulse 1.5s infinite alternate; /* Animasi berdenyut */
        }

        /* Keyframe untuk animasi berdenyut */
        @keyframes pulse {
            from { transform: scale(0.9); }
            to { transform: scale(1.1); }
        }

        /* Gaya untuk teks skor dan layar Game Over */
        #score, #game-over-screen h2, #game-over-screen p, #restart-button {
            color: var(--neon-green);
            text-shadow: 0 0 5px var(--neon-green), 0 0 10px var(--neon-green);
        }

        #restart-button {
            background-color: var(--neon-green);
            color: var(--dark-bg);
            box-shadow: 0 0 8px var(--neon-green);
        }

        #restart-button:hover {
            box-shadow: 0 0 15px var(--neon-green), 0 0 25px var(--neon-green);
            transform: scale(1.05);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div id="game-container" class="relative border-4 rounded-lg shadow-xl p-2 md:p-4">
        <div id="game-board">
            <!-- Sel-sel game akan dibuat di sini oleh JavaScript -->
        </div>
        <div id="score" class="absolute top-2 left-2 text-xl md:text-2xl">Skor: <span id="current-score">0</span></div>
        <div id="game-over-screen" class="absolute inset-0 flex flex-col items-center justify-center bg-gray-900 bg-opacity-90 rounded-lg hidden">
            <h2 class="text-3xl md:text-5xl font-bold mb-4">Game Over!</h2>
            <p class="text-xl md:text-3xl mb-8">Skor Akhir: <span id="final-score">0</span></p>
            <button id="restart-button" class="px-6 py-3 md:px-8 md:py-4 text-lg md:text-2xl font-bold rounded-lg transition-all duration-200">Main Lagi</button>
        </div>
    </div>

    <script>
        // --- Konfigurasi Game ---
        const GRID_SIZE = 20;
        const INITIAL_SNAKE_SPEED = 200; // Milidetik per update
        const MIN_SNAKE_SPEED = 50; // Kecepatan minimum ular
        const SPEED_INCREASE_AMOUNT = 8; // Berapa ms kecepatan bertambah setiap kali makan

        // --- Elemen DOM ---
        const gameBoard = document.getElementById('game-board');
        const scoreDisplay = document.getElementById('current-score');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalScoreDisplay = document.getElementById('final-score');
        const restartButton = document.getElementById('restart-button');

        // --- Variabel Game State ---
        let snake = [];
        let food = {};
        let dx = 0; // Perubahan x (arah horizontal)
        let dy = 0; // Perubahan y (arah vertikal)
        let score = 0;
        let gameInterval;
        let gameSpeed = INITIAL_SNAKE_SPEED;
        let isChangingDirection = false; // Mencegah perubahan arah ganda dalam satu tick game
        let isGameOver = false;

        // --- Fungsi Utama Game ---

        // Inisialisasi atau Reset Game
        function initGame() {
            // Reset state
            snake = [
                { x: Math.floor(GRID_SIZE / 2), y: Math.floor(GRID_SIZE / 2) }, // Kepala ular di tengah
                { x: Math.floor(GRID_SIZE / 2), y: Math.floor(GRID_SIZE / 2) + 1 } // Tubuh ular
            ];
            food = {};
            dx = 0;
            dy = -1; // Awalnya bergerak ke atas
            score = 0;
            gameSpeed = INITIAL_SNAKE_SPEED;
            isChangingDirection = false;
            isGameOver = false;

            scoreDisplay.textContent = score;
            gameOverScreen.classList.add('hidden'); // Sembunyikan layar game over

            createBoard();
            generateFood();
            draw();
            startGameLoop();
        }

        // Membuat papan game (div-div kotak)
        function createBoard() {
            gameBoard.innerHTML = ''; // Bersihkan papan sebelumnya
            gameBoard.style.setProperty('--grid-size', GRID_SIZE); // Atur variabel CSS
            gameBoard.style.setProperty('--cell-size', ${CELL_SIZE}px);

            for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
                const cell = document.createElement('div');
                cell.classList.add('game-cell');
                gameBoard.appendChild(cell);
            }
        }

        // Mengambil elemen sel game berdasarkan koordinat (x, y)
        function getGameCell(x, y) {
            // Flatten 2D coords to 1D index
            return gameBoard.children[y * GRID_SIZE + x];
        }

        // Menggambar ular dan makanan di papan
        function draw() {
            // Bersihkan semua sel dari kelas snake-cell dan food-cell
            document.querySelectorAll('.snake-cell').forEach(cell => cell.classList.remove('snake-cell'));
            document.querySelectorAll('.food-cell').forEach(cell => cell.classList.remove('food-cell'));

            // Gambar ular
            snake.forEach(segment => {
                const cell = getGameCell(segment.x, segment.y);
                if (cell) cell.classList.add('snake-cell');
            });

            // Gambar makanan
            const foodCell = getGameCell(food.x, food.y);
            if (foodCell) foodCell.classList.add('food-cell');
        }

        // Memperbarui posisi game (ular bergerak, makan, dll.)
        function updateGame() {
            if (isGameOver) return;

            isChangingDirection = false; // Izinkan perubahan arah baru untuk tick berikutnya

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // Deteksi tabrakan
            if (checkCollision(head)) {
                endGame();
                return;
            }

            snake.unshift(head); // Tambahkan kepala baru

            // Cek apakah ular makan makanan
            if (head.x === food.x && head.y === food.y) {
                score++;
                scoreDisplay.textContent = score;
                generateFood();
                increaseSpeed();
            } else {
                snake.pop(); // Hapus ekor jika tidak makan
            }

            draw();
        }

        // Deteksi tabrakan (dinding atau tubuh sendiri)
        function checkCollision(head) {
            // Tabrakan dengan dinding
            if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
                return true;
            }

            // Tabrakan dengan tubuh sendiri (mulai dari segmen ke-4 untuk menghindari tabrakan dengan "leher")
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    return true;
                }
            }

            return false;
        }

        // Menghasilkan posisi makanan baru secara acak
        function generateFood() {
            let newFoodPos;
            while (true) {
                newFoodPos = {
                    x: Math.floor(Math.random() * GRID_SIZE),
                    y: Math.floor(Math.random() * GRID_SIZE)
                };
                // Pastikan makanan tidak muncul di atas ular
                const collisionWithSnake = snake.some(segment =>
                    segment.x === newFoodPos.x && segment.y === newFoodPos.y
                );
                if (!collisionWithSnake) {
                    food = newFoodPos;
                    break;
                }
            }
        }

        // Mengatur dan memulai loop game
        function startGameLoop() {
            clearInterval(gameInterval); // Hentikan interval sebelumnya jika ada
            gameInterval = setInterval(updateGame, gameSpeed);
        }

        // Meningkatkan kecepatan ular
        function increaseSpeed() {
            gameSpeed = Math.max(MIN_SNAKE_SPEED, gameSpeed - SPEED_INCREASE_AMOUNT);
            startGameLoop(); // Restart loop dengan kecepatan baru
        }

        // Mengakhiri permainan
        function endGame() {
            isGameOver = true;
            clearInterval(gameInterval);
            finalScoreDisplay.textContent = score;
            gameOverScreen.classList.remove('hidden'); // Tampilkan layar game over
        }

        // --- Event Listener ---

        // Menangani input keyboard untuk arah
        document.addEventListener('keydown', handleKeyPress);

        function handleKeyPress(event) {
            if (isChangingDirection || isGameOver) return; // Abaikan jika sedang ganti arah atau game over

            const key = event.key;
            // Mencegah ular berbalik arah 180 derajat
            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingLeft = dx === -1;
            const goingRight = dx === 1;

            if (key === 'ArrowUp' && !goingDown) {
                dx = 0;
                dy = -1;
                isChangingDirection = true;
                event.preventDefault(); // Mencegah scroll halaman
            } else if (key === 'ArrowDown' && !goingUp) {
                dx = 0;
                dy = 1;
                isChangingDirection = true;
                event.preventDefault();
            } else if (key === 'ArrowLeft' && !goingRight) {
                dx = -1;
                dy = 0;
                isChangingDirection = true;
                event.preventDefault();
            } else if (key === 'ArrowRight' && !goingLeft) {
                dx = 1;
                dy = 0;
                isChangingDirection = true;
                event.preventDefault();
            }
        }

        // Menangani klik tombol restart
        restartButton.addEventListener('click', initGame);

        // --- Mulai Game Saat Halaman Dimuat ---
        document.addEventListener('DOMContentLoaded', initGame);
    </script>
</body>
</html>
